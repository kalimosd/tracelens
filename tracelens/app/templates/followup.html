<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} — 追问</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div class="max-w-3xl mx-auto py-10 px-4">
      <!-- Header -->
      <div class="mb-8">
        <a href="/" class="text-blue-600 text-sm hover:underline">← 新分析</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">追问</h1>
        <p class="text-xs text-gray-400 mt-1">Session: {{ session_id }}</p>
      </div>

      <!-- Question -->
      <div class="bg-gray-100 rounded-lg p-4 mb-4">
        <p class="text-sm text-gray-500 mb-1">你的问题</p>
        <p class="text-gray-800 font-medium">{{ question }}</p>
      </div>

      <!-- Answer -->
      <div class="bg-white rounded-lg shadow-sm border p-4 mb-6">
        <p class="text-sm text-gray-500 mb-2">回答</p>
        <div class="text-gray-700 text-sm whitespace-pre-wrap leading-relaxed">{{ answer }}</div>
      </div>

      <!-- Continue asking -->
      <div class="bg-white p-6 rounded-lg shadow-sm border">
        <h2 class="text-lg font-semibold text-gray-800 mb-3">继续追问</h2>
        <form method="post" action="/followup" class="flex gap-2">
          <input type="hidden" name="session_id" value="{{ session_id }}" />
          <input name="question" type="text" required placeholder="继续追问..."
            class="flex-1 rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <button type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-blue-700 transition">
            提问
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
